<h2>TravelMapPage — 页面效果预览</h2>
<p class="subtitle">全屏地图 + 返回按钮 + 图钉弹卡</p>

<div class="mockup">
  <div class="mockup-header">TravelMapPage（标准底图 · 全屏）</div>
  <div class="mockup-body" style="padding:0;position:relative;height:340px;overflow:hidden">

    <!-- 地图底图模拟 -->
    <div style="position:absolute;inset:0;background:linear-gradient(160deg,#dce8d8 0%,#c8dfc0 40%,#b8d4b0 70%,#a8c8a0 100%)">
      <!-- 道路模拟线条 -->
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:.25" viewBox="0 0 400 340">
        <line x1="0" y1="120" x2="400" y2="160" stroke="#888" stroke-width="2"/>
        <line x1="80" y1="0" x2="120" y2="340" stroke="#888" stroke-width="1.5"/>
        <line x1="0" y1="220" x2="400" y2="200" stroke="#888" stroke-width="1"/>
        <line x1="200" y1="0" x2="210" y2="340" stroke="#888" stroke-width="1"/>
        <line x1="300" y1="0" x2="280" y2="340" stroke="#aaa" stroke-width="1"/>
      </svg>

      <!-- 图钉 - 北京 -->
      <div style="position:absolute;top:22%;left:55%;font-size:22px;cursor:pointer" title="北京">📍</div>
      <!-- 上海 -->
      <div style="position:absolute;top:42%;left:72%;font-size:22px;cursor:pointer" title="上海">📍</div>
      <!-- 南京 -->
      <div style="position:absolute;top:45%;left:66%;font-size:22px;cursor:pointer" title="南京">📍</div>
      <!-- 桐庐 -->
      <div style="position:absolute;top:52%;left:68%;font-size:22px;cursor:pointer" title="桐庐">📍</div>
      <!-- 溧阳 -->
      <div style="position:absolute;top:48%;left:65%;font-size:22px;cursor:pointer" title="溧阳">📍</div>
      <!-- 泉州 -->
      <div style="position:absolute;top:62%;left:64%;font-size:22px;cursor:pointer" title="泉州">📍</div>
      <!-- 厦门 -->
      <div style="position:absolute;top:65%;left:62%;font-size:22px;cursor:pointer" title="厦门">📍</div>

      <!-- InfoWindow 弹卡（上海示例） -->
      <div style="position:absolute;top:25%;left:62%;background:#fff;border-radius:8px;padding:10px 14px;box-shadow:0 4px 16px rgba(0,0,0,.2);min-width:100px;z-index:10">
        <div style="font-size:15px;font-weight:600;color:#222;margin-bottom:2px">上海</div>
        <div style="font-size:12px;color:#888">2024年5月</div>
        <div style="position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid #fff"></div>
      </div>
    </div>

    <!-- 返回按钮 -->
    <div style="position:absolute;top:14px;left:14px;z-index:20;background:rgba(255,255,255,.9);border:1px solid #ddd;border-radius:8px;padding:7px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.1)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      返回
    </div>

    <!-- 统计角标 -->
    <div style="position:absolute;bottom:14px;right:14px;z-index:20;background:rgba(255,255,255,.88);border:1px solid #ddd;border-radius:8px;padding:6px 12px;font-size:12px;color:#555;box-shadow:0 2px 8px rgba(0,0,0,.08)">
      已去 <strong style="color:#333">7</strong> 个城市
    </div>
  </div>
</div>

<div class="section" style="margin-top:20px">
  <h3>说明</h3>
  <ul style="color:#aaa;font-size:14px;line-height:1.8">
    <li>返回按钮：左上角浮层，白色半透明背景</li>
    <li>图钉：高德默认红色图钉（可后期自定义）</li>
    <li>弹卡：点击图钉弹出，再次点击或点地图空白处关闭</li>
    <li>右下角：城市计数统计小标签</li>
  </ul>
</div>
